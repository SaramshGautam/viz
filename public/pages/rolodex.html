<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Rolodex Linkograph</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <div id="wrap">
      <header>
        <div class="title">Rolodex Linkograph</div>
        <div class="hint">
          Drag to rotate. Click a card to bring it to the front.
        </div>
        <div class="spacer"></div>

        <label class="hint" for="rot">Rotation</label>
        <input id="rot" type="range" min="-180" max="180" value="0" step="1" />

        <button id="toggleIncoming">Incoming</button>
        <button id="toggleOutgoing">Outgoing</button>
        <button id="reset">Reset</button>
      </header>

      <div id="viz"></div>
    </div>

    <script type="module" src="../js/rolodex.js"></script>
  </body>
</html>
