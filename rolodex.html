<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Rolodex Linkograph</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
      :root {
        --bg: #0b0f14;
        --fg: #e8eef6;
        --muted: #96a2b4;
        --card: #121a24;
        --stroke: #263244;
        --axis: rgba(180, 200, 230, 0.18);
      }

      html,
      body {
        height: 100%;
        margin: 0;
        background: var(--bg);
        color: var(--fg);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      #wrap {
        height: 100%;
        display: flex;
        flex-direction: column;
      }

      header {
        padding: 12px 16px;
        border-bottom: 1px solid #121a24;
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }

      .title {
        font-weight: 700;
        letter-spacing: 0.2px;
      }

      .hint {
        color: var(--muted);
        font-size: 13px;
      }

      .spacer {
        flex: 1;
      }

      button,
      input[type="range"] {
        background: #0f1722;
        color: var(--fg);
        border: 1px solid #1c2736;
        border-radius: 10px;
        padding: 8px 10px;
        font-size: 13px;
      }

      button {
        cursor: pointer;
      }

      button:hover {
        border-color: #2b3b52;
      }

      #viz {
        flex: 1;
        position: relative;
      }

      svg {
        width: 100%;
        height: 100%;
        display: block;
      }

      .axis-line {
        stroke: var(--axis);
        stroke-width: 2;
      }

      .axis-core {
        stroke: rgba(255, 255, 255, 0.08);
        stroke-width: 6;
        stroke-linecap: round;
      }

      .link {
        fill: none;
        stroke: rgba(160, 190, 255, 0.22);
        stroke-width: 2;
        transition: opacity 160ms ease, stroke-width 160ms ease;
      }

      .link.dim {
        opacity: 0.06;
      }

      .link.hi {
        opacity: 0.95;
        stroke: rgba(160, 190, 255, 0.9);
        stroke-width: 3;
      }

      .card {
        cursor: pointer;
        transition: opacity 140ms ease;
      }

      .card rect {
        fill: var(--card);
        stroke: var(--stroke);
        stroke-width: 1.2;
        rx: 16;
        ry: 16;
      }

      .card .meta {
        fill: var(--muted);
        font-size: 12px;
      }

      .card .text {
        fill: var(--fg);
        font-size: 13px;
      }

      .card .badge {
        fill: #0f1722;
        stroke: #1c2736;
        rx: 10;
        ry: 10;
      }

      .card .badgeText {
        fill: var(--muted);
        font-size: 11px;
      }

      .card.focus rect {
        stroke: rgba(130, 180, 255, 0.9);
        stroke-width: 1.8;
      }

      .card.dim {
        opacity: 0.18;
      }
    </style>
  </head>
  <body>
    <div id="wrap">
      <header>
        <div class="title">Rolodex Linkograph</div>
        <div class="hint">
          Drag to rotate. Click a card to bring it to the front.
        </div>
        <div class="spacer"></div>

        <label class="hint">Rotation</label>
        <input id="rot" type="range" min="-180" max="180" value="0" step="1" />

        <button id="toggleIncoming">Incoming</button>
        <button id="toggleOutgoing">Outgoing</button>
        <button id="reset">Reset</button>
      </header>

      <div id="viz"></div>
    </div>

    <script>
      const nodes = [
        {
          id: "I1",
          who: "A",
          t: "00:18",
          text: "Let’s do a 2-day coastal itinerary (beach + seafood).",
        },
        {
          id: "I2",
          who: "B",
          t: "00:34",
          text: "Alternative: mountain cabin + hiking; cheaper and quieter.",
        },
        {
          id: "I3",
          who: "C",
          t: "01:05",
          text: "Constraint: drive time max 4 hours; avoid toll-heavy routes.",
        },
        {
          id: "I4",
          who: "A",
          t: "01:22",
          text: "We can cluster: coastal vs mountain; then pick one.",
        },
        {
          id: "I5",
          who: "B",
          t: "02:10",
          text: "If coastal: add lighthouse stop + sunset viewpoint.",
        },
        {
          id: "I6",
          who: "C",
          t: "03:02",
          text: "I’ll summarize: 2 options + constraints; vote next.",
        },
        {
          id: "I7",
          who: "A",
          t: "03:44",
          text: "Premature convergence check: list 2 more wild options?",
        },
        {
          id: "I8",
          who: "B",
          t: "04:12",
          text: "Wild option: city food crawl + museum day.",
        },
        {
          id: "I9",
          who: "C",
          t: "04:40",
          text: "Wild option: lake camping + stargazing.",
        },
      ];

      const links = [
        { source: "I4", target: "I1", type: "cluster" },
        { source: "I4", target: "I2", type: "cluster" },
        { source: "I5", target: "I1", type: "build" },
        { source: "I6", target: "I3", type: "summarize" },
        { source: "I6", target: "I4", type: "summarize" },
        { source: "I7", target: "I6", type: "challenge" },
        { source: "I8", target: "I7", type: "respond" },
        { source: "I9", target: "I7", type: "respond" },
        { source: "I2", target: "I3", type: "constraint" },
      ];

      const container = document.getElementById("viz");
      const svg = d3.select(container).append("svg");
      const root = svg.append("g");

      const gAxis = root.append("g");
      const gLinks = root.append("g");
      const gCards = root.append("g");

      let width = 800;
      let height = 600;
      let center = { x: width / 2, y: height / 2 + 20 };

      let rotationDeg = 0;
      let focusedId = null;
      let showIncoming = true;
      let showOutgoing = true;

      const rotInput = document.getElementById("rot");
      const btnIncoming = document.getElementById("toggleIncoming");
      const btnOutgoing = document.getElementById("toggleOutgoing");
      const btnReset = document.getElementById("reset");

      const CARD_W = 280;
      const CARD_H = 132;

      let wheelRY = 190; // vertical rotation radius
      let frontSpreadX = 28; // how much cards fan outward at the front
      let backSpreadX = 12; // smaller fan at the back

      function resize() {
        const r = container.getBoundingClientRect();
        width = Math.max(320, r.width);
        height = Math.max(320, r.height);

        svg.attr("viewBox", `0 0 ${width} ${height}`);
        center = { x: width / 2, y: height / 2 + 10 };

        wheelRY = Math.min(230, height * 0.33);
        frontSpreadX = Math.min(40, width * 0.018);
        backSpreadX = Math.min(18, width * 0.01);

        render();
      }

      window.addEventListener("resize", resize);

      function setToggleButtonState() {
        btnIncoming.style.opacity = showIncoming ? 1 : 0.55;
        btnOutgoing.style.opacity = showOutgoing ? 1 : 0.55;
        btnIncoming.textContent = showIncoming ? "Incoming ✓" : "Incoming";
        btnOutgoing.textContent = showOutgoing ? "Outgoing ✓" : "Outgoing";
      }

      btnIncoming.addEventListener("click", () => {
        showIncoming = !showIncoming;
        setToggleButtonState();
        render();
      });

      btnOutgoing.addEventListener("click", () => {
        showOutgoing = !showOutgoing;
        setToggleButtonState();
        render();
      });

      btnReset.addEventListener("click", () => {
        focusedId = null;
        rotationDeg = 0;
        rotInput.value = 0;
        showIncoming = true;
        showOutgoing = true;
        setToggleButtonState();
        render();
      });

      rotInput.addEventListener("input", (e) => {
        rotationDeg = +e.target.value;
        render();
      });

      setToggleButtonState();

      const drag = d3
        .drag()
        .on("start", (event) => {
          root.attr("data-drag-start-y", event.y);
          root.attr("data-drag-start-rot", rotationDeg);
        })
        .on("drag", (event) => {
          const startY = +root.attr("data-drag-start-y");
          const startRot = +root.attr("data-drag-start-rot");
          const dy = event.y - startY;

          rotationDeg = startRot + dy * 0.35;
          rotationDeg = Math.max(-180, Math.min(180, rotationDeg));
          rotInput.value = rotationDeg;
          render();
        });

      svg.call(drag);

      function angleForIndex(i, n) {
        const base = (i / n) * Math.PI * 2;
        return base + (rotationDeg * Math.PI) / 180;
      }

      function normalizeAngle(a) {
        while (a > Math.PI) a -= Math.PI * 2;
        while (a < -Math.PI) a += Math.PI * 2;
        return a;
      }

      // Horizontal principal axis, cards rotate top -> front -> bottom -> back
      // front is at angle 0
      function posForIndex(i, n) {
        const a = angleForIndex(i, n);

        // y follows vertical wheel
        const y = center.y + Math.sin(a) * wheelRY;

        // depth: 1 at front, 0 at back
        const depth = (Math.cos(a) + 1) / 2;

        // cards fan horizontally more when closer to the front
        const sideSign = Math.sin(a) >= 0 ? 1 : -1;
        const spread = backSpreadX + depth * frontSpreadX;
        const x = center.x + sideSign * spread * i * 0.35;

        return { x, y, a, depth };
      }

      function cardScale(depth) {
        return 0.68 + depth * 0.42;
      }

      function cardOpacity(depth) {
        return 0.18 + depth * 0.82;
      }

      function cardTransform(d, forceFront = false) {
        const depth = forceFront ? 1.15 : d.depth;
        const scale = forceFront ? 1.18 : cardScale(depth);

        // slight tilt illusion: compress vertically a bit at back
        const sy = forceFront ? 1.03 : 0.86 + depth * 0.18;

        return `translate(${d.x},${d.y}) scale(${scale},${sy})`;
      }

      function linkPath(s, t) {
        const midX = center.x;
        const axisY = center.y;

        const c1x = (s.x + midX) / 2;
        const c2x = (t.x + midX) / 2;

        // bend toward axis so links feel threaded through rolodex
        const c1y = (s.y + axisY) / 2;
        const c2y = (t.y + axisY) / 2;

        return `M ${s.x} ${s.y}
                C ${c1x} ${c1y},
                  ${c2x} ${c2y},
                  ${t.x} ${t.y}`;
      }

      function wrapText(selection, width, maxLines) {
        selection.each(function (d) {
          const textSel = d3.select(this);
          textSel.selectAll("*").remove();

          const words = d.text.split(/\s+/);
          const lineHeight = 16;
          let line = [];
          let lineNumber = 0;

          let tspan = textSel
            .append("tspan")
            .attr("x", -CARD_W / 2 + 14)
            .attr("dy", 0);

          for (const word of words) {
            line.push(word);
            tspan.text(line.join(" "));

            const node = tspan.node();
            if (node && node.getComputedTextLength() > width) {
              line.pop();
              tspan.text(line.join(" "));
              line = [word];
              lineNumber += 1;

              if (lineNumber >= maxLines) {
                const current = tspan.text();
                tspan.text(current.replace(/\.*$/, "") + "…");
                break;
              }

              tspan = textSel
                .append("tspan")
                .attr("x", -CARD_W / 2 + 14)
                .attr("dy", lineHeight)
                .text(word);
            }
          }
        });
      }

      function renderAxis() {
        gAxis.selectAll("*").remove();

        const axisLeft = center.x - width * 0.18;
        const axisRight = center.x + width * 0.18;

        gAxis
          .append("line")
          .attr("class", "axis-core")
          .attr("x1", axisLeft)
          .attr("y1", center.y)
          .attr("x2", axisRight)
          .attr("y2", center.y);

        gAxis
          .append("line")
          .attr("class", "axis-line")
          .attr("x1", axisLeft)
          .attr("y1", center.y)
          .attr("x2", axisRight)
          .attr("y2", center.y);
      }

      function render() {
        renderAxis();

        const n = nodes.length;
        const positioned = nodes.map((d, i) => {
          const p = posForIndex(i, n);
          return { ...d, i, ...p };
        });

        const posById = new Map(positioned.map((d) => [d.id, d]));

        const depthSort = [...positioned].sort((a, b) => a.depth - b.depth);

        const enrichedLinks = links
          .map((l) => {
            const s = posById.get(l.source);
            const t = posById.get(l.target);
            return { ...l, s, t };
          })
          .filter((l) => l.s && l.t);

        let visibleLinks = enrichedLinks;
        if (focusedId) {
          visibleLinks = enrichedLinks.filter((l) => {
            const isIncoming = l.target === focusedId;
            const isOutgoing = l.source === focusedId;
            return (showIncoming && isIncoming) || (showOutgoing && isOutgoing);
          });
        }

        const linkSel = gLinks
          .selectAll("path.link")
          .data(visibleLinks, (d) => `${d.source}->${d.target}:${d.type}`);

        linkSel
          .enter()
          .append("path")
          .attr("class", "link")
          .merge(linkSel)
          .attr("opacity", (d) => {
            const avgDepth = (d.s.depth + d.t.depth) / 2;
            return 0.08 + avgDepth * 0.65;
          })
          .attr("d", (d) => linkPath(d.s, d.t));

        linkSel.exit().remove();

        const cardSel = gCards.selectAll("g.card").data(depthSort, (d) => d.id);

        const cardEnter = cardSel
          .enter()
          .append("g")
          .attr("class", "card")
          .on("click", (event, d) => {
            focusedId = focusedId === d.id ? null : d.id;

            if (focusedId) {
              const delta = -d.a;
              rotationDeg += (delta * 180) / Math.PI;
              rotationDeg = Math.max(-180, Math.min(180, rotationDeg));
              rotInput.value = rotationDeg;
            }

            render();
          })
          .on("mouseenter", (event, d) => {
            gLinks
              .selectAll("path.link")
              .classed("dim", true)
              .classed("hi", false);

            gLinks
              .selectAll("path.link")
              .filter((l) => l.source === d.id || l.target === d.id)
              .classed("dim", false)
              .classed("hi", true);

            if (!focusedId) {
              gCards.selectAll("g.card").classed("dim", (c) => c.id !== d.id);
            }
          })
          .on("mouseleave", () => {
            gLinks
              .selectAll("path.link")
              .classed("dim", false)
              .classed("hi", false);
            gCards.selectAll("g.card").classed("dim", false);
          });

        cardEnter
          .append("rect")
          .attr("x", -CARD_W / 2)
          .attr("y", -CARD_H / 2)
          .attr("width", CARD_W)
          .attr("height", CARD_H);

        cardEnter
          .append("text")
          .attr("class", "meta")
          .attr("x", -CARD_W / 2 + 14)
          .attr("y", -CARD_H / 2 + 22);

        cardEnter
          .append("text")
          .attr("class", "text")
          .attr("x", -CARD_W / 2 + 14)
          .attr("y", -CARD_H / 2 + 46);

        const badge = cardEnter
          .append("g")
          .attr(
            "transform",
            `translate(${CARD_W / 2 - 66},${-CARD_H / 2 + 10})`
          );

        badge
          .append("rect")
          .attr("class", "badge")
          .attr("width", 56)
          .attr("height", 22);

        badge
          .append("text")
          .attr("class", "badgeText")
          .attr("x", 28)
          .attr("y", 15)
          .attr("text-anchor", "middle");

        const cardAll = cardEnter.merge(cardSel);

        cardAll
          .classed("focus", (d) => focusedId && d.id === focusedId)
          .style("opacity", (d) => {
            if (focusedId && d.id === focusedId) return 1;
            return cardOpacity(d.depth);
          })
          .attr("transform", (d) =>
            cardTransform(d, focusedId && d.id === focusedId)
          );

        cardAll.select("text.meta").text((d) => `${d.who} · ${d.t}`);
        cardAll.select(".badgeText").text((d) => d.id);
        wrapText(cardAll.select("text.text"), CARD_W - 28, 3);

        if (focusedId) {
          const neighbors = new Set([focusedId]);
          links.forEach((l) => {
            if (l.source === focusedId) neighbors.add(l.target);
            if (l.target === focusedId) neighbors.add(l.source);
          });

          gCards
            .selectAll("g.card")
            .classed("dim", (d) => !neighbors.has(d.id));
        } else {
          gCards.selectAll("g.card").classed("dim", false);
        }

        cardSel.exit().remove();
      }

      resize();
    </script>
  </body>
</html>
